name: Cumulus CI

on:
  push:
    branches: [master, cumulus]
  pull_request:
    branches: [master]

jobs:
  desktop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create symlinks for test includes
        run: |
          ln -sf "$(pwd)/clouds" clouds/test/clouds
          ln -sf "$(pwd)/stmlib" clouds/test/stmlib

      - name: Build test
        run: make -C clouds/test

      - name: Run regression (generate + verify baselines)
        run: |
          cd clouds/test
          ./clouds_test --save-baseline
          ./clouds_test

  arm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware via Docker
        run: docker build -t clouds-build .

      - name: Extract artifacts
        run: |
          id=$(docker create clouds-build)
          docker cp "$id:/eurorack/build/clouds/clouds.bin" clouds.bin
          docker cp "$id:/eurorack/build/clouds/clouds.wav" cumulus.wav 2>/dev/null || true
          docker rm "$id"

      - name: Generate WAV (fallback if Docker didn't produce it)
        if: ${{ hashFiles('cumulus.wav') == '' }}
        run: |
          pip install numpy scipy
          PYTHONPATH=. python3 stm_audio_bootloader/qpsk/encoder.py \
            -t stm32f4 -s 48000 -b 12000 -c 6000 -p 256 \
            clouds.bin -o cumulus.wav

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cumulus-firmware
          path: |
            clouds.bin
            cumulus.wav
