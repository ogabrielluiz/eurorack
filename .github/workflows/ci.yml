name: Cumulus CI

on:
  push:
    branches: [master, cumulus]
  pull_request:

jobs:
  desktop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create symlinks for test includes
        run: |
          ln -sf "$(pwd)/clouds" clouds/test/clouds
          ln -sf "$(pwd)/stmlib" clouds/test/stmlib

      - name: Build test
        run: make -C clouds/test

      - name: Run regression (generate + verify baselines)
        run: |
          cd clouds/test
          ./clouds_test --save-baseline
          ./clouds_test

  arm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware and WAV via Docker
        run: docker build -t clouds-build .

      - name: Extract artifacts
        run: |
          id=$(docker create clouds-build)
          mkdir -p artifacts
          docker cp "$id:/eurorack/build/clouds/clouds.bin" artifacts/cumulus.bin
          docker cp "$id:/eurorack/build/clouds/clouds.wav" artifacts/cumulus.wav || \
            echo "WAV not generated (expected if encoder needs Python 3 fixes)"
          docker rm "$id"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cumulus-firmware
          path: artifacts/
